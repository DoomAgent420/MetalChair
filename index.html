<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>New Tab</title>
<style>
  body {
    background:#000;
    color:#0f0;
    font-family:Consolas, monospace;
    padding:20px;
  }
  #cmd {
    background:#000;
    color:#0f0;
    border:0;
    outline:none;
    width:90%;
    font-size:16px;
  }
</style>
</head>
<body>
  <div>> <input id="cmd" autofocus placeholder="enter url or search" /></div>
  <script>
    const WORKER = "https://broad-meadow-a6f7.chrisjlove2022.workers.dev/?q=";

    document.getElementById("cmd").addEventListener("keydown", e => {
      if (e.key !== "Enter") return;

      let q = e.target.value.trim();
      if (!q) return;

      // If user types "google.com", add https://
      if (!/^https?:\/\//i.test(q)) {
        if (/^[a-z0-9.-]+\.[a-z]{2,}$/i.test(q)) {
          q = "https://" + q;
        } else {
          // treat as search
          q = "https://www.google.com/search?q=" + encodeURIComponent(q);
        }
      }

      // Redirect into Worker proxy
      location.href = WORKER + encodeURIComponent(q);
    });
  </script>
</body>
</html>
